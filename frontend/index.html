<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Injective World Cup Predictor</title>
  <style>
    :root { --bg: #f6f7fb; --card: #fff; --accent: #00d2ff; --text: #1a1a2e; }
    body { font-family: system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; margin: 0; background: var(--bg); color: var(--text); padding: 2rem; }
    h1 { margin-top: 0; }
    .container { max-width: 760px; margin: 0 auto; }
    .match { background: var(--card); border-radius: 12px; padding: 1rem 1.25rem; margin-bottom: 1rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
    .teams { font-size: 1.25rem; font-weight: 700; margin-bottom: 0.25rem; }
    .meta { color: #666; font-size: 0.9rem; margin-bottom: 0.75rem; }
    .actions { display: flex; gap: 0.5rem; flex-wrap: wrap; }
    button { cursor: pointer; border: none; border-radius: 8px; padding: 0.55rem 1rem; font-size: 0.95rem; }
    .free { background: #e8f5e9; color: #1b5e20; }
    .paid { background: var(--accent); color: #fff; }
    .prediction { margin-top: 0.75rem; padding: 0.75rem; background: #f1f3f9; border-radius: 8px; font-size: 0.95rem; }
    .prediction strong { display: block; margin-bottom: 0.25rem; }
    .badge { font-size: 0.7rem; text-transform: uppercase; padding: 0.15rem 0.4rem; border-radius: 4px; background: #ffeb3b; color: #1a1a2e; margin-left: 0.5rem; }
  </style>
</head>
<body>
  <div class="container">
    <h1>⚽ Injective World Cup Predictor</h1>
    <p>Real-time World Cup match insights powered by Injective x402, MCP and AI predictions.</p>
    <div id="matches"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
